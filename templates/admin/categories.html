{% extends 'admin/base.html' %}

{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>分类管理</h1>
        <div class="d-flex">
            <form class="d-flex me-3" action="{{ url_for('admin.categories') }}" method="get">
                <input class="form-control me-2" type="search" placeholder="搜索分类..." name="q" aria-label="Search">
                <button class="btn btn-outline-success" type="submit">搜索</button>
            </form>
            <a href="{{ url_for('admin.create_category') }}" class="btn btn-primary">创建分类</a>
        </div>
    </div>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>名称</th>
                <th>创建时间</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            {% for category in categories %}
            <tr>
                <td>{{ category.id }}</td>
                <td>{{ category.name }}</td>
                <td>{{ category.created_at.strftime('%Y-%m-%d') }}</td>
                <td>
                    <a href="{{ url_for('admin.edit_category', id=category.id) }}" class="btn btn-sm btn-primary">编辑</a>
                    <a href="{{ url_for('admin.delete_category', id=category.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('确定要删除吗？')">删除</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
