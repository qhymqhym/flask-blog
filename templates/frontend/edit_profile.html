{% extends 'frontend/personal_center.html' %}

{% block content %}
<div class="col-md-12">
    <div class="personal-center">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-avatar">
                    {{ current_user.display_name[0].upper() }}
                </div>
                <h3>{{ current_user.display_name }}</h3>
                <p class="text-light text-sm">个人中心</p>
            </div>
            <ul class="sidebar-menu">
                <li><a href="{{ url_for('frontend.personal_center') }}">个人概览</a></li>
                <li><a href="{{ url_for('frontend.personal_articles') }}">文章管理</a></li>
                <li><a href="{{ url_for('frontend.personal_comments') }}">评论管理</a></li>
                <li><a href="{{ url_for('frontend.personal_likes') }}">点赞管理</a></li>
                <li><a href="{{ url_for('frontend.edit_profile') }}" class="active">编辑资料</a></li>
                <li><a href="{{ url_for('frontend.change_password') }}">修改密码</a></li>
                <li><a href="{{ url_for('frontend.user_profile', user_id=current_user.id) }}">查看个人主页</a></li>
                <li><a href="{{ url_for('frontend.logout') }}">退出登录</a></li>
            </ul>
        </div>
        
        <!-- 主内容区 -->
        <div class="main-content">
            <h2 class="section-title">编辑资料</h2>
            
            <!-- 编辑资料表单 -->
            <div class="card">
                <div class="card-body">
                    <form method="POST">
                        <div class="form-group mb-3">
                            <label for="nickname" class="form-label">昵称</label>
                            <input type="text" class="form-control" id="nickname" name="nickname" value="{{ user.nickname or '' }}" placeholder="请输入昵称">
                        </div>
                        <div class="form-group mb-3">
                            <label for="email" class="form-label">联系邮箱</label>
                            <input type="email" class="form-control" id="email" name="email" value="{{ user.email or '' }}" placeholder="请输入邮箱">
                        </div>
                        <div class="form-group mb-3">
                            <label for="bio" class="form-label">个人简介</label>
                            <textarea class="form-control" id="bio" name="bio" rows="4" placeholder="请输入个人简介">{{ user.bio or '' }}</textarea>
                        </div>
                        <div class="form-group mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="profile_public" name="profile_public" {% if user.profile_public %}checked{% endif %} value="1">
                                <label class="form-check-label" for="profile_public">
                                    个人主页公开
                                </label>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">保存修改</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
