{% extends 'frontend/base.html' %}

{% block head %}
<!-- EasyMDE CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
<style>
    /* 确保容器有足够的空间 */
    .container {
        overflow-x: hidden;
    }
    
    /* EasyMDE编辑器样式 */
    .easymde {
        margin-bottom: 20px;
    }
    
    .CodeMirror {
        font-family: 'Courier New', Courier, monospace;
        font-size: 14px;
        line-height: 1.5;
    }
</style>
{% endblock %}

{% block content %}
<div class="col-md-12">
    <h1 class="mb-4">编辑文章</h1>
    <form action="{{ url_for('frontend.edit_article', id=article.id) }}" method="post" enctype="multipart/form-data">
        <div class="form-group mb-3">
            <label for="title">标题</label>
            <input type="text" class="form-control" id="title" name="title" value="{{ article.title }}" required>
        </div>
        <div class="form-group mb-3">
            <label for="category_id">分类</label>
            <select class="form-control" id="category_id" name="category_id" required>
                {% for category in categories %}
                <option value="{{ category.id }}" {% if article.category_id==category.id %}selected{% endif %}>{{ category.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group mb-3">
            <label for="tags">标签</label>
            <select class="form-control" id="tags" name="tags" multiple required>
                {% for tag in tags %}
                <option value="{{ tag.id }}" {% if tag in article.tags %}selected{% endif %}>{{ tag.name }}</option>
                {% endfor %}
            </select>
            <small class="form-text text-muted">按住Ctrl键可选择多个标签</small>
        </div>
        <div class="form-group mb-3">
            <label for="cover">封面图</label>
            <input type="file" class="form-control" id="cover" name="cover">
            {% if article.cover_image %}
            <img src="{{ url_for('static', filename='images/' ~ article.cover_image) }}" class="img-thumbnail mt-2" style="max-width: 200px;">
            {% endif %}
        </div>
        <div class="form-group mb-3">
            <label for="content">内容</label>
            <textarea class="form-control" id="content" name="content" rows="15" required>{{ article.content }}</textarea>
            <small class="form-text text-muted">支持Markdown格式</small>
        </div>
        <div class="form-group mb-3">
            <label for="status">状态</label>
            <select class="form-control" id="status" name="status">
                <option value="draft" {% if article.status=='draft' %}selected{% endif %}>草稿</option>
                <option value="published" {% if article.status=='published' %}selected{% endif %}>已发布</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">保存</button>
    </form>
</div>
{% endblock %}

{% block sidebar %}
{% endblock %}

{% block script %}
<!-- EasyMDE JS -->
<script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const easyMDE = new EasyMDE({
            element: document.getElementById('content'),
            spellChecker: false,
            toolbar: [
                'bold', 'italic', 'heading', '|',
                'code', 'quote', 'unordered-list', 'ordered-list', '|',
                'link', 'image', '|',
                'preview', 'side-by-side', 'fullscreen', '|',
                'guide'
            ],
            sideBySideFullscreen: false,
            placeholder: '请输入Markdown内容...'
        });
        
        // 确保表单提交时内容被同步
        document.querySelector('form').addEventListener('submit', function() {
            easyMDE.save();
        });
    });
</script>
{% endblock %}
