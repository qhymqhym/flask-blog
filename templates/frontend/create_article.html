{% extends 'frontend/base.html' %}

{% block head %}
<!-- EasyMDE CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
<style>
    /* 确保卡片容器有足够的空间 */
    .card-body {
        overflow-x: hidden;
    }

    /* EasyMDE编辑器样式 */
    .easymde {
        margin-bottom: 20px;
    }

    .CodeMirror {
        font-family: 'Courier New', Courier, monospace;
        font-size: 14px;
        line-height: 1.5;
    }
</style>
{% endblock %}

{% block content %}
<div class="col-md-12">
    <div class="card shadow-lg rounded-lg overflow-hidden">
        <div class="card-header bg-primary text-white">
            <h3 class="text-center">发布文章</h3>
        </div>
        <div class="card-body p-5">
            <form action="{{ url_for('frontend.create_article') }}" method="post" enctype="multipart/form-data">
                <div class="form-group mb-4">
                    <label for="title" class="form-label">标题</label>
                    <input type="text" class="form-control form-control-lg" id="title" name="title" required>
                </div>
                <div class="form-group mb-4">
                    <label for="category_id" class="form-label">分类</label>
                    <select class="form-control form-control-lg" id="category_id" name="category_id" required>
                        {% for category in categories %}
                        <option value="{{ category.id }}">{{ category.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group mb-4">
                    <label for="tags" class="form-label">标签</label>
                    <select class="form-control form-control-lg" id="tags" name="tags" multiple required>
                        {% for tag in tags %}
                        <option value="{{ tag.id }}">{{ tag.name }}</option>
                        {% endfor %}
                    </select>
                    <small class="form-text text-muted">按住Ctrl键可选择多个标签</small>
                </div>
                <div class="form-group mb-4">
                    <label for="cover" class="form-label">封面图</label>
                    <input type="file" class="form-control form-control-lg" id="cover" name="cover">
                </div>
                <div class="form-group mb-4">
                    <label for="content" class="form-label">内容</label>
                    <textarea class="form-control form-control-lg" id="content" name="content" rows="15"
                        style="display: none;"></textarea>
                    <small class="form-text text-muted">支持Markdown格式</small>
                </div>


                <div class="form-group mb-4">
                    <label for="status" class="form-label">状态</label>
                    <select class="form-control form-control-lg" id="status" name="status">
                        <option value="draft">草稿</option>
                        <option value="published">已发布</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-lg btn-block">发布文章</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block sidebar %}
{% endblock %}

{% block script %}
<!-- EasyMDE JS -->
<script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const easyMDE = new EasyMDE({
            element: document.getElementById('content'),
            spellChecker: false,
            toolbar: [
                'bold', 'italic', 'heading', '|',
                'code', 'quote', 'unordered-list', 'ordered-list', '|',
                'link', 'image', '|',
                'preview', '|',
                'guide'
            ],
            sideBySideFullscreen: false,
            placeholder: '请输入Markdown内容...'
        });

        // 确保表单提交时内容被同步
        document.querySelector('form').addEventListener('submit', function () {
            easyMDE.save();
        });
    });
</script>
{% endblock %}
