{% extends 'frontend/personal_center.html' %}

{% block content %}
<div class="col-md-12">
    <div class="personal-center">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-avatar">
                    {{ current_user.display_name[0].upper() }}
                </div>
                <h3>{{ current_user.display_name }}</h3>
                <p class="text-light text-sm">个人中心</p>
            </div>
            <ul class="sidebar-menu">
                <li><a href="{{ url_for('frontend.personal_center') }}">个人概览</a></li>
                <li><a href="{{ url_for('frontend.personal_articles') }}">文章管理</a></li>
                <li><a href="{{ url_for('frontend.personal_comments') }}">评论管理</a></li>
                <li><a href="{{ url_for('frontend.personal_likes') }}">点赞管理</a></li>
                <li><a href="{{ url_for('frontend.edit_profile') }}">编辑资料</a></li>
                <li><a href="{{ url_for('frontend.change_password') }}" class="active">修改密码</a></li>
                <li><a href="{{ url_for('frontend.user_profile', user_id=current_user.id) }}">查看个人主页</a></li>
                <li><a href="{{ url_for('frontend.logout') }}">退出登录</a></li>
            </ul>
        </div>
        
        <!-- 主内容区 -->
        <div class="main-content">
            <h2 class="section-title">修改密码</h2>
            
            <!-- 修改密码表单 -->
            <div class="card">
                <div class="card-body">
                    <form method="POST">
                        <div class="form-group mb-3">
                            <label for="old_password" class="form-label">原密码</label>
                            <input type="password" class="form-control" id="old_password" name="old_password" placeholder="请输入原密码" required>
                        </div>
                        <div class="form-group mb-3">
                            <label for="new_password" class="form-label">新密码</label>
                            <input type="password" class="form-control" id="new_password" name="new_password" placeholder="请输入新密码" required>
                        </div>
                        <div class="form-group mb-3">
                            <label for="confirm_password" class="form-label">确认新密码</label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="请确认新密码" required>
                        </div>
                        <button type="submit" class="btn btn-primary">修改密码</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
